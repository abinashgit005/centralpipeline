name: Central Build Pipeline

on:
  repository_dispatch:
    types: [run-pipeline]   # will be triggered by developer's repo
  workflow_dispatch:

env:
  PROJECT_ID: poc101-500018
  REGION: asia-south1
  REPO: gcppoc

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest

    steps:
      # ── 1. Generate token via GitHub App to access developer's repo ──
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PLATFORM_APP_ID }}
          private-key: ${{ secrets.PLATFORM_APP_PRIVATE_KEY }}
          owner: ${{ github.event.client_payload.org }}

      # ── 2. Checkout DEVELOPER's code (not your repo) ──
      - name: Checkout Developer Code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repo }}
          ref: ${{ github.event.client_payload.sha }}
          token: ${{ steps.app-token.outputs.token }}

      # ── 3. Post "pending" status on developer's commit/PR ──
      - name: Post Pending Status
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.event.client_payload.repo }}/statuses/${{ github.event.client_payload.sha }} \
            -d '{
              "state": "pending",
              "description": "Build pipeline running...",
              "context": "platform-ci/build"
            }'

      # ── 4. Authenticate to GCP (YOUR credentials, developer never sees this) ──
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 5. Setup gcloud CLI ──
      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # ── 6. Configure Docker for YOUR Artifact Registry ──
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      # ── 7. Build Docker image  ──
      # Image name = developer's repo name + their commit SHA as tag
      - name: Build Docker Image
        run: |
          IMAGE_NAME=$(echo "${{ github.event.client_payload.repo }}" | cut -d'/' -f2)
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${IMAGE_NAME}:${{ github.event.client_payload.sha }} .
          docker tag \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${IMAGE_NAME}:${{ github.event.client_payload.sha }} \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${IMAGE_NAME}:latest

      # ── 8. Push to YOUR GCP Artifact Registry ──
      - name: Push Docker Image
        run: |
          IMAGE_NAME=$(echo "${{ github.event.client_payload.repo }}" | cut -d'/' -f2)
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${IMAGE_NAME}:${{ github.event.client_payload.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${IMAGE_NAME}:latest

      # ── 9. Post SUCCESS status back to developer's PR ──
      - name: Post Success Status
        if: success()
        run: |
          IMAGE_NAME=$(echo "${{ github.event.client_payload.repo }}" | cut -d'/' -f2)
          curl -s -X POST \
            -H "Authorization: token ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.event.client_payload.repo }}/statuses/${{ github.event.client_payload.sha }} \
            -d "{
              \"state\": \"success\",
              \"description\": \"Image pushed: ${IMAGE_NAME}:${{ github.event.client_payload.sha }}\",
              \"context\": \"platform-ci/build\"
            }"

      # ── 10. Post FAILURE status back to developer's PR ──
      - name: Post Failure Status
        if: failure()
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.event.client_payload.repo }}/statuses/${{ github.event.client_payload.sha }} \
            -d '{
              "state": "failure",
              "description": "Build failed! Check platform pipeline logs.",
              "context": "platform-ci/build"
            }'
      # 11. Update image tag in ArgoCD config repo
      - name: Update Image Tag in ArgoCD Config
        run: |
          git config --global user.email "pipeline@platform.com"
          git config --global user.name "Central Pipeline"

          IMAGE_NAME=$(echo "${{ github.event.client_payload.repo }}" | cut -d'/' -f2)
          SHA=${{ github.event.client_payload.sha }}

          git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/abinashgit005/argocd-config.git
          cd argocd-config

          mkdir -p apps/${IMAGE_NAME}/dev

          cat > apps/${IMAGE_NAME}/dev/deployment.yaml << 'MANIFEST'
          apiVersion: v1
          kind: Namespace
          metadata:
            name: dev
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: APPNAME
            namespace: dev
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: APPNAME
            template:
              metadata:
                labels:
                  app: APPNAME
              spec:
                containers:
                - name: APPNAME
                  image: asia-south1-docker.pkg.dev/poc101-500018/gcppoc/APPNAME:SHA
                  ports:
                  - containerPort: 80
                  resources:
                    requests:
                      memory: "128Mi"
                      cpu: "100m"
                    limits:
                      memory: "256Mi"
                      cpu: "200m"
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: APPNAME-service
            namespace: dev
          spec:
            selector:
              app: APPNAME
            ports:
            - protocol: TCP
              port: 80
              targetPort: 80
            type: LoadBalancer
          MANIFEST

          # Replace placeholders with actual values
          sed -i "s|APPNAME|${IMAGE_NAME}|g" apps/${IMAGE_NAME}/dev/deployment.yaml
          sed -i "s|SHA|${SHA}|g" apps/${IMAGE_NAME}/dev/deployment.yaml

          git add .
          git commit -m "Deploy ${IMAGE_NAME}:${SHA} to DEV"
          git push