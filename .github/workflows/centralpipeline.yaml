name: Central Build Pipeline

on:
  repository_dispatch:
    types: [run-pipeline]
  workflow_dispatch:

env:
  PROJECT_ID: poc101-500018
  REGION: asia-south1
  REPO: gcppoc

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PLATFORM_APP_ID }}
          private-key: ${{ secrets.PLATFORM_APP_PRIVATE_KEY }}
          owner: ${{ github.event.client_payload.org }}

      - name: Checkout Developer Code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repo }}
          ref: ${{ github.event.client_payload.sha }}
          token: ${{ steps.app-token.outputs.token }}

      # ── Read platform.yaml from developer repo ──
      - name: Read platform.yaml
        id: platform
        run: |
          # Read values from platform.yaml
          APP_NAME=$(grep 'name:' platform.yaml | head -1 | awk '{print $2}')
          APP_PORT=$(grep 'port:' platform.yaml | awk '{print $2}')
          APP_REPLICAS=$(grep 'replicas:' platform.yaml | awk '{print $2}')

          # If platform.yaml missing → use repo name as default
          if [ -z "$APP_NAME" ]; then
            APP_NAME=$(echo "${{ github.event.client_payload.repo }}" | cut -d'/' -f2)
          fi
          if [ -z "$APP_PORT" ]; then APP_PORT=80; fi
          if [ -z "$APP_REPLICAS" ]; then APP_REPLICAS=1; fi

          echo "app_name=${APP_NAME}" >> $GITHUB_OUTPUT
          echo "app_port=${APP_PORT}" >> $GITHUB_OUTPUT
          echo "app_replicas=${APP_REPLICAS}" >> $GITHUB_OUTPUT

          echo "App: ${APP_NAME}, Port: ${APP_PORT}, Replicas: ${APP_REPLICAS}"

      - name: Post Pending Status
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.event.client_payload.repo }}/statuses/${{ github.event.client_payload.sha }} \
            -d '{"state":"pending","description":"Pipeline running...","context":"platform-ci/build"}'

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      # ── Build with dynamic app name ──
      - name: Build Docker Image
        run: |
          APP_NAME=${{ steps.platform.outputs.app_name }}
          SHA=${{ github.event.client_payload.sha }}
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${APP_NAME}:${SHA} .
          docker tag \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${APP_NAME}:${SHA} \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${APP_NAME}:latest

      - name: Push Docker Image
        run: |
          APP_NAME=${{ steps.platform.outputs.app_name }}
          SHA=${{ github.event.client_payload.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${APP_NAME}:${SHA}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${APP_NAME}:latest

      # ── Update ArgoCD config dynamically ──
      - name: Update ArgoCD Config
        run: |
          git config --global user.email "pipeline@platform.com"
          git config --global user.name "Central Pipeline"

          APP_NAME=${{ steps.platform.outputs.app_name }}
          APP_PORT=${{ steps.platform.outputs.app_port }}
          APP_REPLICAS=${{ steps.platform.outputs.app_replicas }}
          SHA=${{ github.event.client_payload.sha }}

          git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/abinashgit005/argocd-config.git
          cd argocd-config

          mkdir -p apps/${APP_NAME}/dev

          # Generate manifest dynamically
          cat > apps/${APP_NAME}/dev/deployment.yaml << EOF
          apiVersion: v1
          kind: Namespace
          metadata:
            name: dev
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${APP_NAME}
            namespace: dev
          spec:
            replicas: ${APP_REPLICAS}
            selector:
              matchLabels:
                app: ${APP_NAME}
            template:
              metadata:
                labels:
                  app: ${APP_NAME}
              spec:
                containers:
                - name: ${APP_NAME}
                  image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${APP_NAME}:${SHA}
                  ports:
                  - containerPort: ${APP_PORT}
                  resources:
                    requests:
                      memory: "128Mi"
                      cpu: "100m"
                    limits:
                      memory: "256Mi"
                      cpu: "200m"
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${APP_NAME}-service
            namespace: dev
          spec:
            selector:
              app: ${APP_NAME}
            ports:
            - protocol: TCP
              port: 80
              targetPort: ${APP_PORT}
            type: LoadBalancer
          EOF

          git add .
          git commit -m "Deploy ${APP_NAME}:${SHA} to DEV"
          git push

      - name: Post Success Status
        if: success()
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.event.client_payload.repo }}/statuses/${{ github.event.client_payload.sha }} \
            -d '{"state":"success","description":"Deployed to DEV!","context":"platform-ci/build"}'

      - name: Post Failure Status
        if: failure()
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.event.client_payload.repo }}/statuses/${{ github.event.client_payload.sha }} \
            -d '{"state":"failure","description":"Pipeline failed!","context":"platform-ci/build"}'
